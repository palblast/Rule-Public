; GEOIP / FINAL
;==================================================
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL
;==================================================
; 主代理组 (已接入全量高级节点分组)
;==================================================
custom_proxy_group=🚀 节点选择`select`[]🚀 手动切换`[]♻️ 自动选择`[]DIRECT`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🇬🇧 英国节点`[]欧盟节点`[]俄罗斯节点`[]其他国家节点
custom_proxy_group=🚀 手动切换`select`^((?!(UnblockMusic|music|Music|网易云|云音乐|Netease|🎶|解锁)).)*$`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🇬🇧 英国节点`[]欧盟节点`[]俄罗斯节点`[]其他国家节点
custom_proxy_group=♻️ 自动选择`url-test`^((?!(Expire|Traffic|流量|套餐|到期)).)*$`http://www.gstatic.com/generate_204`300,,50
;==================================================
; 国家/地区节点组（高阶防坑正则：自动剔除高倍率专线及游戏节点）
;==================================================
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)(?!.*(专线|手游|游戏|(?i)IPLC|IEPL|game))(🇭🇰|港|香港|\b(HK|Hong\x20?Kong)\b).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇨🇳 台湾节点`url-test`(?i)(?!.*(专线|手游|游戏|(?i)IPLC|IEPL|game))(🇹🇼|🇨🇳|台|台湾|台灣|\b(TW|Taiwan)\b).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 狮城节点`url-test`(?i)(?!.*(专线|手游|游戏|(?i)IPLC|IEPL|game))(🇸🇬|坡|新加坡|狮城|\b(SG|Singapore)\b).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)(?!.*(专线|手游|游戏|(?i)IPLC|IEPL|game))(🇯🇵|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|\b(JP|Japan)\b).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`url-test`(?i)(?!.*(专线|手游|游戏|(?i)IPLC|IEPL|game))(🇺🇸|美|美国|美國|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|\b(US|United\x20?States|American)\b).*`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇬🇧 英国节点`url-test`(?i)(?!.*(专线|手游|游戏|(?i)IPLC|IEPL|game))(🇬🇧|英|英国|英國|大不列颠及北爱尔兰联合王国|联合王国|伦敦|\b(UK|Britain|United\x20?Kingdom)\b).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=欧盟节点`url-test`(?i)(?!.*(专线|手游|游戏|(?i)IPLC|IEPL|game))(🇦🇹|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|奥地利|比利时|捷克|丹麦|芬兰|法国|德国|爱尔兰|意大利|立陶宛|卢森堡|荷兰|波兰|瑞典).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=俄罗斯节点`url-test`(?i)(?!.*(专线|手游|游戏|(?i)IPLC|IEPL|game))(🇷🇺|俄|俄罗斯|俄羅斯|\b(RU|Russia)\b).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国节点`url-test`(?i)(?!.*(专线|手游|游戏|(?i)IPLC|IEPL|game))(🇰🇷|韩|韓|韩国|韓國|首尔|南朝鲜|\b(KR|KOR|Korea|South\x20?Korea)\b).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=其他国家节点`url-test`^((?i)(?!\bemby\b|🇹🇼|🇨🇳|台|台湾|台灣|\b(TW|Taiwan)\b|🇭🇰|港|香港|\b(HK|Hong\x20?Kong)\b|🇯🇵|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|\b(JP|Japan)\b|🇰🇷|韩|韓|韩国|韓國|首尔|南朝鲜|\b(KR|KOR|Korea|South\x20?Korea)\b|🇸🇬|坡|新加坡|狮城|\b(SG|Singapore)\b|🇺🇸|美|美国|美國|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|\b(US|United\x20?States|American)\b|🇬🇧|英|英国|英國|大不列颠及北爱尔兰联合王国|联合王国|伦敦|\b(UK|Britain|United\x20?Kingdom)\b|🇦🇹|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|奥地利|比利时|捷克|丹麦|芬兰|法国|德国|爱尔兰|意大利|立陶宛|卢森堡|荷兰|波兰|瑞典|🇷🇺|俄|俄罗斯|俄羅斯|\b(RU|Russia)\b|套餐|流量|过滤).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎥 奈飞节点`url-test`(NF|奈飞|解锁|Netflix|NETFLIX|Media)`http://www.gstatic.com/generate_204`300,,50
